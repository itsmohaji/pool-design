<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LIJBAILAT Pool — Realistic 3D Design Studio</title>
<style>
:root{--glass:rgba(14,18,24,.78);--line:rgba(255,255,255,.16);--text:#f5f7fb;--muted:#b9c1cc}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0c1118;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);touch-action:none}canvas{display:block;width:100%;height:100%}
.panel{position:fixed;z-index:10;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.36)}
#hero{top:max(14px,env(safe-area-inset-top));left:14px;width:min(410px,calc(100vw - 28px));padding:18px}#hero h1{font-size:19px;line-height:1.15;margin:0 0 7px}#hero p{font-size:12px;line-height:1.5;color:var(--muted);margin:0 0 12px}.actions{display:flex;gap:8px;flex-wrap:wrap}
button,select{font:inherit;border:0;border-radius:12px;padding:11px 13px;font-weight:700}button{cursor:pointer;background:#f5f7fb;color:#111721}button.secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid var(--line)}button:active{transform:scale(.98)}
#studio{top:max(14px,env(safe-area-inset-top));right:14px;width:270px;padding:14px;max-height:calc(100vh - 28px);overflow:auto}#studio h2{font-size:14px;margin:0 0 11px}.field{margin:0 0 10px}.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 5px}.field select{width:100%;padding:10px 11px;background:#f4f5f7;color:#151a21}.buttonGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.buttonGrid button{font-size:12px;padding:10px 6px}
#status{left:14px;bottom:max(14px,env(safe-area-inset-bottom));padding:10px 12px;font-size:11px;color:#d9dee7}#status b{color:#fff}
#mobilePad{position:fixed;left:16px;bottom:max(18px,env(safe-area-inset-bottom));z-index:12;display:none}.pad{display:grid;grid-template-columns:58px 58px 58px;grid-template-rows:58px 58px;gap:7px}.pad button{width:58px;height:58px;padding:0;border-radius:18px;background:rgba(19,24,31,.83);color:#fff;border:1px solid var(--line);font-size:20px;box-shadow:0 10px 28px rgba(0,0,0,.28)}
#lookHint{position:fixed;z-index:8;left:50%;bottom:25px;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.8);background:rgba(0,0,0,.35);padding:8px 11px;border-radius:999px;pointer-events:none;transition:opacity .4s}
@media(max-width:760px){#hero{padding:14px}#hero p{display:none}#studio{top:auto;bottom:max(14px,env(safe-area-inset-bottom));right:10px;width:190px;max-height:45vh;padding:10px;border-radius:17px}#studio h2{font-size:12px}.field{margin-bottom:7px}.field select{padding:8px;font-size:12px}.buttonGrid button{font-size:10px;padding:9px 4px}#mobilePad{display:block}#status{display:none}#lookHint{bottom:50vh}}
</style>
</head>
<body>
<div id="hero" class="panel">
  <h1>LIJBAILAT Pool — Realistic 3D Studio</h1>
  <p>Walk around the triangular pool area, look in every direction and switch materials, furniture and lighting live.</p>
  <div class="actions"><button id="enter">Enter Walkthrough</button><button id="hideHero" class="secondary">Hide</button></div>
</div>
<div id="studio" class="panel">
  <h2>Design Studio</h2>
  <div class="field"><label>Deck finish</label><select id="deck"><option value="travertine">Travertine</option><option value="limestone">Light limestone</option><option value="wood">Teak decking</option><option value="dark">Dark porcelain</option></select></div>
  <div class="field"><label>Pool finish</label><select id="pool"><option value="aqua">Crystal aqua</option><option value="deep">Deep blue</option><option value="emerald">Emerald</option><option value="sand">Sand lagoon</option></select></div>
  <div class="field"><label>Walls</label><select id="wall"><option value="ivory">Warm ivory</option><option value="greige">Soft greige</option><option value="stone">Natural stone</option><option value="charcoal">Charcoal</option></select></div>
  <div class="field"><label>Furniture set</label><select id="furniture"><option value="resort">Luxury resort</option><option value="minimal">Minimal white</option><option value="warm">Warm contemporary</option><option value="dark">Dark modern</option></select></div>
  <div class="field"><label>Landscape</label><select id="landscape"><option value="med">Mediterranean</option><option value="tropical">Tropical</option><option value="desert">Desert minimal</option></select></div>
  <div class="field"><label>Atmosphere</label><select id="time"><option value="day">Bright day</option><option value="sunset">Golden sunset</option><option value="night">Warm night</option></select></div>
  <div class="buttonGrid"><button id="lights" class="secondary">Lights</button><button id="reset" class="secondary">Reset view</button><button id="overview" class="secondary">Overview</button><button id="shot" class="secondary">Save image</button></div>
</div>
<div id="status" class="panel"><b>Move:</b> WASD / arrows &nbsp;·&nbsp; <b>Look:</b> drag &nbsp;·&nbsp; <b>Fast:</b> Shift</div>
<div id="mobilePad"><div class="pad"><span></span><button data-m="f">▲</button><span></span><button data-m="l">◀</button><button data-m="b">▼</button><button data-m="r">▶</button></div></div>
<div id="lookHint">Drag anywhere to look around</div>
<script src="three.min.js"></script>
<script>
if(!window.THREE){document.body.innerHTML='<div style="padding:30px;color:white;font-family:sans-serif">The 3D library did not load. Confirm that <b>three.min.js</b> is in the same GitHub folder as index.html.</div>';throw new Error('THREE missing')}
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xc7ddeb);scene.fog=new THREE.FogExp2(0xc7ddeb,.012);
const camera=new THREE.PerspectiveCamera(64,innerWidth/innerHeight,.08,180);camera.position.set(11.2,1.68,9.7);
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;renderer.outputEncoding=THREE.sRGBEncoding;document.body.prepend(renderer.domElement);
function canvasTexture(type){const c=document.createElement('canvas');c.width=c.height=512;const x=c.getContext('2d');x.fillStyle=type==='wood'?'#8b6546':type==='dark'?'#3f4245':'#c8baa4';x.fillRect(0,0,512,512);if(type==='wood'){for(let i=0;i<18;i++){x.fillStyle=i%2?'rgba(40,20,8,.12)':'rgba(255,235,205,.08)';x.fillRect(i*30,0,3,512);for(let j=0;j<12;j++){x.strokeStyle='rgba(45,25,12,.09)';x.beginPath();x.moveTo(i*30,j*45);x.bezierCurveTo(i*30+15,j*45+8,i*30-10,j*45+25,i*30+25,j*45+40);x.stroke()}}}else{for(let i=0;i<260;i++){const a=Math.random()*.09;x.fillStyle='rgba(255,255,255,'+a+')';x.fillRect(Math.random()*512,Math.random()*512,Math.random()*30+3,1);x.fillStyle='rgba(35,25,15,'+(a*.45)+')';x.fillRect(Math.random()*512,Math.random()*512,Math.random()*25+2,1)}for(let i=0;i<8;i++){x.strokeStyle='rgba(70,60,50,.12)';x.beginPath();x.moveTo(0,i*64);x.lineTo(512,i*64+Math.random()*6);x.stroke()}}const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(5,5);t.anisotropy=renderer.capabilities.getMaxAnisotropy();return t}
const tex={travertine:canvasTexture('stone'),limestone:canvasTexture('stone'),wood:canvasTexture('wood'),dark:canvasTexture('dark')};
const mat=(color,rough=.75,metal=.02,map=null)=>new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,map});
function box(x,y,z,w,h,d,material,cast=true){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);o.position.set(x,y,z);o.castShadow=cast;o.receiveShadow=true;scene.add(o);return o}
function cylinder(x,y,z,r,h,material,segments=28){const o=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,segments),material);o.position.set(x,y,z);o.castShadow=true;o.receiveShadow=true;scene.add(o);return o}
const hemi=new THREE.HemisphereLight(0xeaf7ff,0x5d5a50,1.35);scene.add(hemi);const sun=new THREE.DirectionalLight(0xfff0d5,3.1);sun.position.set(-18,27,10);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-30;sun.shadow.camera.right=30;sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;sun.shadow.bias=-.0003;scene.add(sun);
const groundMat=mat(0xb7ab98,.98,0,tex.travertine),deckMat=mat(0xc0b39e,.9,0,tex.travertine),copingMat=mat(0xd9d4ca,.55),villaMat=mat(0xe8e1d7,.88),wallMat=mat(0xd6d0c5,.92),metalMat=mat(0x20262b,.22,.65),glassMat=new THREE.MeshPhysicalMaterial({color:0x24444f,roughness:.08,metalness:.05,transparent:true,opacity:.65,clearcoat:1});
box(0,-.18,0,64,.35,52,groundMat,false);box(20,4,0,10,8,34,villaMat);box(14.88,4,0,.18,8,34,wallMat);
for(let z=-12;z<=12;z+=5.2){box(14.72,2.65,z,.18,3.25,3.35,glassMat);box(14.58,2.65,z,.1,3.5,.12,metalMat);box(14.58,2.65,z,.1,.12,3.4,metalMat)}
const poolShape=new THREE.Shape();poolShape.moveTo(-13,-10);poolShape.lineTo(7,-10);poolShape.lineTo(7,10);poolShape.closePath();const shellGeo=new THREE.ExtrudeGeometry(poolShape,{depth:.5,bevelEnabled:false});shellGeo.rotateX(-Math.PI/2);const shell=new THREE.Mesh(shellGeo,mat(0xe5e9ea,.42));shell.position.y=-.03;shell.receiveShadow=true;scene.add(shell);
const waterShape=new THREE.Shape();waterShape.moveTo(-11.85,-8.95);waterShape.lineTo(5.8,-8.95);waterShape.lineTo(5.8,8.5);waterShape.closePath();const waterGeo=new THREE.ShapeGeometry(waterShape);waterGeo.rotateX(-Math.PI/2);const waterMat=new THREE.MeshPhysicalMaterial({color:0x28c9dd,roughness:.04,metalness:.03,transparent:true,opacity:.86,clearcoat:1,clearcoatRoughness:.05,side:THREE.DoubleSide});const water=new THREE.Mesh(waterGeo,waterMat);water.position.y=.3;scene.add(water);
const poolFloor=new THREE.Mesh(waterGeo.clone(),mat(0xd9f4f1,.58));poolFloor.position.y=-.24;scene.add(poolFloor);
const deck1=box(10,.02,0,5.8,.18,27.8,deckMat);const deck2=box(-2.6,.015,-12.1,22.2,.16,3.9,deckMat);const deck3=box(8.6,.015,11,3.0,.16,5.5,deckMat);
box(-2.7,.34,-10.12,21.2,.3,.58,copingMat);box(7.13,.34,.05,.58,.3,20.7,copingMat);const diag=box(-3.1,.34,0,.58,.3,28.3,copingMat);diag.rotation.y=-Math.PI/4;
const boundary=[];const b1=box(-5.78,1.25,.05,.34,2.5,32.5,wallMat);b1.rotation.y=-Math.PI/4;boundary.push(b1);boundary.push(box(-.4,1.25,-14,.34,2.5,24.5,wallMat));boundary.push(box(8.45,1.25,12.5,.34,2.5,7.2,wallMat));
// steps inside pool
for(let i=0;i<4;i++)box(-7.8+i*.42,-.02-i*.06,-7.8+i*.42,4.8-i*.65,.18,.7,copingMat);
// plants
const plants=[];function plant(x,z,s=.8,kind='med'){const trunk=cylinder(x,.55*s,z,.14*s,1.1*s,mat(0x68452d,.95),16);const crown=new THREE.Group();if(kind==='tropical'){for(let i=0;i<7;i++){const leaf=new THREE.Mesh(new THREE.SphereGeometry(.48*s,12,8),mat(0x2f7549,.82));leaf.scale.set(2.0,.35,.5);leaf.rotation.y=i*Math.PI/3.5;leaf.position.set(Math.cos(i)*.3*s,1.32*s,Math.sin(i)*.3*s);crown.add(leaf)}}else{const leaf=new THREE.Mesh(new THREE.SphereGeometry(.78*s,18,12),mat(kind==='desert'?0x6d7e50:0x477553,.9));leaf.scale.y=.82;leaf.position.y=1.35*s;crown.add(leaf)}crown.position.set(x,0,z);scene.add(crown);plants.push({trunk,crown});}
for(let i=0;i<10;i++)plant(-12.2+i*2.18,-12.75,.65+(i%3)*.08);for(let i=0;i<7;i++)plant(8.05,10.7-i*3.18,.58+(i%2)*.08);
// furniture groups
const furnitureGroup=new THREE.Group();scene.add(furnitureGroup);const furnitureMat=mat(0xe8e3da,.78),fabricMat=mat(0xf1ede6,.96),woodMat=mat(0x8f6546,.8),darkFurniture=mat(0x34383d,.55,.12);
function fbox(x,y,z,w,h,d,material=furnitureMat){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);o.position.set(x,y,z);o.castShadow=true;o.receiveShadow=true;furnitureGroup.add(o);return o}
function buildFurniture(style){while(furnitureGroup.children.length)furnitureGroup.remove(furnitureGroup.children[0]);let frame=style==='dark'?darkFurniture:style==='warm'?woodMat:furnitureMat;let fabric=style==='minimal'?mat(0xffffff,.94):style==='dark'?mat(0x666b71,.88):style==='warm'?mat(0xc7a47f,.9):fabricMat;
// lounge sofa area
fbox(11.4,.48,7.5,4.0,.42,1.35,frame);fbox(11.4,1.03,8.03,4.0,.95,.28,frame);fbox(9.53,.72,7.5,.28,.72,1.35,frame);fbox(13.27,.72,7.5,.28,.72,1.35,frame);fbox(11.4,.78,7.45,3.45,.38,1.05,fabric);
fbox(11.4,.34,5.55,2.15,.22,1.08,frame);fbox(9.45,.48,4.3,1.25,.75,1.2,frame);fbox(13.25,.48,4.3,1.25,.75,1.2,frame);
// loungers
for(const [x,z,r] of [[2.7,-5.7,-.08],[4.7,-4.1,-.08]]){const g=new THREE.Group();const base=new THREE.Mesh(new THREE.BoxGeometry(2.35,.18,.78),frame);base.position.y=.3;base.castShadow=true;g.add(base);const pad=new THREE.Mesh(new THREE.BoxGeometry(2.2,.16,.68),fabric);pad.position.y=.48;g.add(pad);g.position.set(x,0,z);g.rotation.y=r;furnitureGroup.add(g)}
// dining table
const top=new THREE.Mesh(new THREE.CylinderGeometry(1.05,1.05,.12,32),frame);top.position.set(10.8,.82,-7.0);top.castShadow=true;furnitureGroup.add(top);const leg=new THREE.Mesh(new THREE.CylinderGeometry(.14,.22,.75,18),metalMat);leg.position.set(10.8,.42,-7.0);furnitureGroup.add(leg);for(let i=0;i<4;i++){const a=i*Math.PI/2;fbox(10.8+Math.cos(a)*1.65,.48,-7+Math.sin(a)*1.65,.82,.72,.82,frame)}}buildFurniture('resort');
// decorative pergola
for(const x of [8.7,13.5])for(const z of [3.2,9.4])box(x,1.65,z,.18,3.3,.18,metalMat);for(let i=0;i<8;i++)box(11.1,3.25,3.3+i*.85,5.0,.12,.11,metalMat);
// wall lights
const bulbs=[];for(const z of [-11,-5.5,0,5.5,11]){const fixture=box(14.45,2.65,z,.2,.58,.42,metalMat);const l=new THREE.PointLight(0xffbb72,0,8.5,2);l.position.set(14.15,2.55,z);scene.add(l);bulbs.push(l)}
// underwater lights
const poolLights=[];for(const p of [[5.4,.0,-5],[5.4,.0,0],[5.4,.0,5]]){const l=new THREE.PointLight(0x7eefff,0,7,2);l.position.set(p[0],.1,p[2]);scene.add(l);poolLights.push(l)}
let yaw=-2.45,pitch=-.06,drag=false,lastX=0,lastY=0,walkMode=true;function applyLook(){camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch}applyLook();
renderer.domElement.addEventListener('pointerdown',e=>{drag=true;lastX=e.clientX;lastY=e.clientY;renderer.domElement.setPointerCapture?.(e.pointerId)});renderer.domElement.addEventListener('pointermove',e=>{if(!drag)return;yaw-=(e.clientX-lastX)*.0042;pitch-=(e.clientY-lastY)*.0037;pitch=Math.max(-1.15,Math.min(1.1,pitch));lastX=e.clientX;lastY=e.clientY;applyLook()});renderer.domElement.addEventListener('pointerup',()=>drag=false);renderer.domElement.addEventListener('pointercancel',()=>drag=false);
const keys={};addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);const mobile={f:false,b:false,l:false,r:false};document.querySelectorAll('[data-m]').forEach(b=>{const k=b.dataset.m;const on=e=>{e.preventDefault();mobile[k]=true},off=e=>{e.preventDefault();mobile[k]=false};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointercancel',off)});
function validPosition(x,z){if(x>14.1||x<-13.7||z>13.3||z<-13.4)return false;const insidePool=(x<6.7&&z>-9.9&&z<9.8&&z<(.95*x+2.2));return !insidePool}
let prev=performance.now();function move(dt){if(!walkMode)return;const forward=Number(keys.KeyW||keys.ArrowUp||mobile.f)-Number(keys.KeyS||keys.ArrowDown||mobile.b);const side=Number(keys.KeyD||keys.ArrowRight||mobile.r)-Number(keys.KeyA||keys.ArrowLeft||mobile.l);const speed=(keys.ShiftLeft||keys.ShiftRight)?7.2:3.7;const fx=-Math.sin(yaw),fz=-Math.cos(yaw),rx=Math.cos(yaw),rz=-Math.sin(yaw);const nx=camera.position.x+(fx*forward+rx*side)*speed*dt,nz=camera.position.z+(fz*forward+rz*side)*speed*dt;if(validPosition(nx,camera.position.z))camera.position.x=nx;if(validPosition(camera.position.x,nz))camera.position.z=nz;camera.position.y=1.68}
function setAtmos(v){sun.color.set(0xffefd2);if(v==='day'){scene.background.set(0xc7ddeb);scene.fog.color.set(0xc7ddeb);sun.position.set(-18,27,10);sun.intensity=3.1;hemi.intensity=1.35;renderer.toneMappingExposure=1.05;bulbs.forEach(l=>l.intensity=0);poolLights.forEach(l=>l.intensity=0)}else if(v==='sunset'){scene.background.set(0xe8a477);scene.fog.color.set(0xe8a477);sun.color.set(0xff9e58);sun.position.set(-24,8,10);sun.intensity=2.4;hemi.intensity=.82;renderer.toneMappingExposure=1.0;bulbs.forEach(l=>l.intensity=.6);poolLights.forEach(l=>l.intensity=.3)}else{scene.background.set(0x07111e);scene.fog.color.set(0x07111e);sun.intensity=.12;hemi.intensity=.27;renderer.toneMappingExposure=.72;bulbs.forEach(l=>l.intensity=2.6);poolLights.forEach(l=>l.intensity=1.25)}}
function setDeck(v){deckMat.map=tex[v];deckMat.color.set(v==='wood'?0xa67852:v==='dark'?0x4b4d50:v==='limestone'?0xd4d0c5:0xc0b39e);deckMat.needsUpdate=true;groundMat.map=tex[v];groundMat.color.copy(deckMat.color);groundMat.needsUpdate=true}
function setWalls(v){const colors={ivory:0xe7dfd2,greige:0xbdb3a6,stone:0xa79d8c,charcoal:0x4d5156};wallMat.color.set(colors[v]);villaMat.color.set(v==='charcoal'?0x686c72:v==='stone'?0xb9b0a2:v==='greige'?0xd1c8bb:0xe8e1d7)}
function setPlants(kind){plants.forEach((p,i)=>{scene.remove(p.crown);const pos=p.trunk.position,s=.65+(i%3)*.08;const c=new THREE.Group();if(kind==='tropical'){for(let j=0;j<7;j++){const leaf=new THREE.Mesh(new THREE.SphereGeometry(.42*s,12,8),mat(0x2d7648,.84));leaf.scale.set(2,.3,.45);leaf.rotation.y=j*Math.PI/3.5;leaf.position.set(Math.cos(j)*.28*s,1.25*s,Math.sin(j)*.28*s);c.add(leaf)}}else{const leaf=new THREE.Mesh(new THREE.SphereGeometry(.75*s,16,11),mat(kind==='desert'?0x74805d:0x477553,.9));leaf.scale.y=.82;leaf.position.y=1.3*s;c.add(leaf)}c.position.set(pos.x,0,pos.z);scene.add(c);p.crown=c})}
document.getElementById('deck').onchange=e=>setDeck(e.target.value);document.getElementById('pool').onchange=e=>waterMat.color.set({aqua:0x28c9dd,deep:0x126bb1,emerald:0x2d9a82,sand:0x55c4bd}[e.target.value]);document.getElementById('wall').onchange=e=>setWalls(e.target.value);document.getElementById('furniture').onchange=e=>buildFurniture(e.target.value);document.getElementById('landscape').onchange=e=>setPlants(e.target.value);document.getElementById('time').onchange=e=>setAtmos(e.target.value);
let lightsOn=false;document.getElementById('lights').onclick=()=>{lightsOn=!lightsOn;bulbs.forEach(l=>l.intensity=lightsOn?2.6:0);poolLights.forEach(l=>l.intensity=lightsOn?1.25:0)};document.getElementById('reset').onclick=()=>{camera.position.set(11.2,1.68,9.7);yaw=-2.45;pitch=-.06;walkMode=true;applyLook()};document.getElementById('overview').onclick=()=>{camera.position.set(18,20,22);yaw=-2.48;pitch=-.62;walkMode=false;applyLook()};document.getElementById('shot').onclick=()=>{renderer.render(scene,camera);const a=document.createElement('a');a.download='LIJBAILAT-pool-design.png';a.href=renderer.domElement.toDataURL('image/png');a.click()};document.getElementById('hideHero').onclick=()=>document.getElementById('hero').style.display='none';document.getElementById('enter').onclick=()=>{document.getElementById('hero').style.display='none';walkMode=true};setTimeout(()=>document.getElementById('lookHint').style.opacity='0',5500);
function animate(t){requestAnimationFrame(animate);const dt=Math.min(.05,(t-prev)/1000);prev=t;move(dt);water.position.y=.30+Math.sin(t*.0015)*.012;waterMat.opacity=.84+Math.sin(t*.001)*.035;renderer.render(scene,camera)}requestAnimationFrame(animate);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
